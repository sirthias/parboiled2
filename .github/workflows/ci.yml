name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        scala: [3.8.4]
        java: [temurin@17, temurin@25]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ignore line ending differences in git
        if: contains(runner.os, 'windows')
        shell: bash
        run: git config --global core.autocrlf false

      - name: Configure pagefile for Windows
        if: contains(runner.os, 'windows')
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 4GB
          maximum-size: 16GB
          disk-root: 'C:'

      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@17)
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Check that workflows are up to date
        shell: bash
        run: sbt --server -v '++ ${{ matrix.scala }}; githubWorkflowCheck'

      - if: runner.os == 'Windows'
        uses: egor-tensin/setup-clang@v2
        with:
          version: 20.1.7
          platform: x64

      - name: Header check
        if: ${{ matrix.java=='temurin@17' && matrix.os=='ubuntu-latest' }}
        shell: bash
        run: sbt --server -v '++ ${{ matrix.scala }}; headerCheckAll'

      - name: Build project
        shell: bash
        run: sbt --server -v '++ ${{ matrix.scala }}; Test/compile; test'

      - name: Compress target directories
        shell: bash
        run: tar cf targets.tar target/out/native0.5/scala-2.12.21/parboiled target/out/jvm/scala-2.13.18/jsonbenchmark target/out/jvm/scala-2.13.18/parboiledcore target/out/sjs1/scala-2.12.21/parboiledcore target/out/jvm/scala-2.13.18/examples target/out/native0.5/scala-2.12.21/parboiledcore target/out/jvm/scala-2.12.21/jsonbenchmark target/out/jvm/scala-3.3.8/parboiled target/out/jvm/scala-2.12.21/examples target/out/sjs1/scala-3.3.8/parboiledcore target/out/sjs1/scala-2.12.21/parboiled target/out/jvm/scala-2.12.21/parboiled target/out/jvm/scala-3.3.8/scalaparser target/out/jvm/scala-2.13.18/scalaparser target/out/native0.5/scala-3.3.8/parboiled target/out/jvm/scala-3.8.4/parboiled2-root target/out/jvm/scala-2.12.21/parboiledcore target/out/sjs1/scala-2.13.18/parboiledcore target/out/native0.5/scala-2.13.18/parboiled target/out/native0.5/scala-2.13.18/parboiledcore target/out/jvm/scala-3.3.8/examples target/out/jvm/scala-2.13.18/parboiled target/out/sjs1/scala-2.13.18/parboiled target/out/jvm/scala-3.3.8/jsonbenchmark target/out/jvm/scala-2.12.21/scalaparser target/out/native0.5/scala-3.3.8/parboiledcore target/out/jvm/scala-3.3.8/parboiledcore target/out/sjs1/scala-3.3.8/parboiled project/target

      - name: Upload target directories
        uses: actions/upload-artifact@v7
        with:
          name: target-${{ matrix.os }}-${{ matrix.scala }}-${{ matrix.java }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v')) && (github.repository_owner == 'sirthias')
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [3.8.4]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ignore line ending differences in git
        if: contains(runner.os, 'windows')
        run: git config --global core.autocrlf false

      - name: Configure pagefile for Windows
        if: contains(runner.os, 'windows')
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 4GB
          maximum-size: 16GB
          disk-root: 'C:'

      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@17)
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download target directories (3.8.4)
        uses: actions/download-artifact@v8
        with:
          name: target-${{ matrix.os }}-3.8.4-${{ matrix.java }}

      - name: Inflate target directories (3.8.4)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Publish project
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt --server -v ci-release
