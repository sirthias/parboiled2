name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        scala: [2.12.21]
        java: [temurin@11, temurin@25]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ignore line ending differences in git
        if: contains(runner.os, 'windows')
        shell: bash
        run: git config --global core.autocrlf false

      - name: Configure pagefile for Windows
        if: contains(runner.os, 'windows')
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 4GB
          maximum-size: 16GB
          disk-root: 'C:'

      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@11)
        if: matrix.java == 'temurin@11'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Check that workflows are up to date
        shell: bash
        run: sbt '++ ${{ matrix.scala }}; githubWorkflowCheck'

      - if: runner.os == 'Windows'
        uses: egor-tensin/setup-clang@v2
        with:
          version: 20.1.7
          platform: x64

      - name: Header check
        if: ${{ matrix.java=='temurin@11' && matrix.os=='ubuntu-latest' }}
        shell: bash
        run: sbt '++ ${{ matrix.scala }}; headerCheckAll'

      - name: Build project
        shell: bash
        run: sbt '++ ${{ matrix.scala }}; Test/compile; test; testOnly scalaparser.SnippetSpec'

      - name: Compress target directories
        shell: bash
        run: tar cf targets.tar scalaParser/target/jvm-3 scalaParser/target/jvm-2.13 parboiled/target/native-2.12 jsonBenchmark/target/jvm-2.13 parboiled/target/native-3 target parboiled-core/target/jvm-2.13 parboiled-core/target/jvm-2.12 parboiled-core/target/js-2.13 parboiled/target/native-2.13 parboiled-core/target/js-2.12 examples/target/jvm-2.13 parboiled-core/target/native-2.12 jsonBenchmark/target/jvm-2.12 parboiled/target/jvm-3 parboiled-core/target/native-2.13 examples/target/jvm-3 parboiled/target/jvm-2.13 parboiled/target/js-2.13 examples/target/jvm-2.12 parboiled-core/target/js-3 jsonBenchmark/target/jvm-3 scalaParser/target/jvm-2.12 parboiled/target/js-2.12 parboiled/target/jvm-2.12 parboiled-core/target/native-3 parboiled-core/target/jvm-3 parboiled/target/js-3 project/target

      - name: Upload target directories
        uses: actions/upload-artifact@v7
        with:
          name: target-${{ matrix.os }}-${{ matrix.scala }}-${{ matrix.java }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v')) && (github.repository_owner == 'sirthias')
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.12.21]
        java: [temurin@11]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ignore line ending differences in git
        if: contains(runner.os, 'windows')
        run: git config --global core.autocrlf false

      - name: Configure pagefile for Windows
        if: contains(runner.os, 'windows')
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 4GB
          maximum-size: 16GB
          disk-root: 'C:'

      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@11)
        if: matrix.java == 'temurin@11'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download target directories (2.12.21)
        uses: actions/download-artifact@v8
        with:
          name: target-${{ matrix.os }}-2.12.21-${{ matrix.java }}

      - name: Inflate target directories (2.12.21)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Publish project
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt ci-release
